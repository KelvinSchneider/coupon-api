version: "3.9"

services:
  coupon-api:
    build: .
    container_name: coupon-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
